<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date idea c:</title>
    <style>
        body {
            background-color: #ffc8fd;
            font-family: 'Comic Sans MS', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #ff6b6b;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .buttons {
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            margin: 0 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2em;
            position: relative;
        }

        #yesBtn {
            background-color: #97cdff;
            color: white;
            z-index: 2;
        }

        #noBtn {
            background-color: #ff6b6b;
            color: white;
            z-index: 1;
        }

        .gif {
            margin: 20px 0;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(90px, 1fr));
            gap: 14px;
            width: min(520px, 92vw);
            margin: 24px auto 0;
        }

        .option-btn {
            min-height: 110px;
            margin: 0;
            padding: 14px 10px;
            border-radius: 18px;
            background-color: #ffffff;
            color: #ff6b6b;
            box-shadow: 0 8px 18px rgba(255, 107, 107, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .option-icon {
            font-size: 2.2em;
            line-height: 1;
        }

        .option-label {
            font-size: 0.95em;
            line-height: 1.1;
        }

        .final-icon {
            font-size: 5em;
            line-height: 1;
            margin: 18px 0;
        }

        .final-image {
            width: min(300px, 78vw);
            border-radius: 18px;
            box-shadow: 0 10px 22px rgba(255, 107, 107, 0.22);
            margin: 12px 0 18px;
        }

        @media (max-width: 420px) {
            h1 {
                font-size: 2em;
            }

            .option-grid {
                grid-template-columns: repeat(2, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nos vemos el jueves?</h1>
        <div class="gif">
            <img src="./media/cute.gif" alt="Cute gif">
        </div>
        <div class="buttons">
            <button id="yesBtn">Yes!</button>
            <button id="noBtn">No >:(</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const container = document.querySelector('.container');
        let yesBtnSize = 1;
        let noBtnSize = 1;

        noBtn.addEventListener('click', () => {
            yesBtnSize *= 1.25;
            yesBtn.style.transform = `scale(${yesBtnSize})`;
            noBtnSize -= 0.1;
            noBtn.style.transform = `scale(${noBtnSize})`;
        });

        function showFinalMessage() {
            container.innerHTML = `
                <img class="final-image" src="./media/final-thursday.jpg" alt="Nos vemos el jueves">
                <h1>nos vemos el jueves c:</h1>
            `;
        }

        yesBtn.addEventListener('click', () => {
            container.innerHTML = `
                <h1>¿Que plan escoges?</h1>
                <div class="option-grid">
                    <button class="option-btn" type="button">
                        <span class="option-icon">🍣</span>
                        <span class="option-label">sushi</span>
                    </button>
                    <button class="option-btn" type="button">
                        <span class="option-icon">🍕</span>
                        <span class="option-label">pizza</span>
                    </button>
                    <button class="option-btn" type="button">
                        <span class="option-icon">👀</span>
                        <span class="option-label">order something..?</span>
                    </button>
                    <button class="option-btn" type="button">
                        <span class="option-icon">🍸</span>
                        <span class="option-label">traguitos</span>
                    </button>
                    <button class="option-btn" type="button">
                        <span class="option-icon">🍔</span>
                        <span class="option-label">burguer</span>
                    </button>
                    <button class="option-btn" type="button">
                        <span class="option-icon">🌮</span>
                        <span class="option-label">mexicano</span>
                    </button>
                </div>
            `;

            document.querySelectorAll('.option-btn').forEach((button) => {
                button.addEventListener('click', showFinalMessage);
            });
        });
    </script>
</body>
</html>
